conf t

hostname SW1

! Basic settings
no ip domain-lookup
ip domain-name ccnalab.com
service password-encryption

! Privileged exec password
enable secret ciscoenpass

! Local administrative user
username admin privilege 15 password admin1pass

! Password policy
security passwords min-length 10

! Management interface (SVI)
interface Vlan1
 description Management VLAN
 ip address 192.168.1.2 255.255.255.0
 no shutdown

! Shutdown unused interfaces
interface range GigabitEthernet1/0/1 - 24
 shutdown

! Open used port again
interface GigabitEthernet1/0/5
 no shutdown

interface GigabitEthernet1/0/6
 no shutdown

! Default gateway for the switch
ip default-gateway 192.168.1.1

! Console access
line con 0
 password ciscoconpass
 login
 logging synchronous

! VTY (remote) access - use local database and SSH only
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0

! SSH and crypto
ip ssh version 2
crypto key generate rsa modulus 1024

! Security / misc
banner motd # Unauthorized access to this device is prohibited. #

end

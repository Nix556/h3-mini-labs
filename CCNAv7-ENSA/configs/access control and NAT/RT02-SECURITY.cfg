conf t

! Create named ACL
ip access-list extended RT2-SECURITY
 remark Allow HTTP/HTTPS/SSH from 10.0.0.0/8 to web server
 permit tcp 10.0.0.0 0.255.255.255 host 209.165.201.1 eq 80
 permit tcp 10.0.0.0 0.255.255.255 host 209.165.201.1 eq 443
 permit tcp 10.0.0.0 0.255.255.255 host 209.165.201.1 eq 22
 remark Deny those services from other sources
 deny tcp any host 209.165.201.1 eq 80
 deny tcp any host 209.165.201.1 eq 443
 deny tcp 192.168.1.0 0.0.0.255 host 209.165.201.1 eq 22
 deny tcp any host 209.165.201.1 eq 22
 permit ip any any
 exit

! Apply ACL inbound on interfaces facing networks
interface GigabitEthernet0/0/0
 ip access-group RT2-SECURITY in
 exit
interface GigabitEthernet0/0/1
 ip access-group RT2-SECURITY in
 exit

end
write memory

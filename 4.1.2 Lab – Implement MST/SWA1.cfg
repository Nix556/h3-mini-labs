conf t

! A1 configuration for Multiple Spanning Tree
hostname A1
banner motd # A1, Multiple Spanning Tree #
spanning-tree mode rapid-pvst

! Console line configuration
line con 0
 exec-timeout 0 0
 logging synchronous
 exit

! Interface configuration
interface range f0/1-24, g0/1-2
 shutdown
 exit
interface range f0/1-4
 switchport mode trunk
 no shutdown
interface f0/23
 no shutdown
 exit

! VLAN configuration
vlan 2
 name SecondVLAN
 exit
vlan 3
 name ThirdVLAN
 exit
vlan 4
 name FourthVLAN
 exit
vlan 5
 name FifthVLAN
 exit
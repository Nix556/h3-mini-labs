! RT02 router configuration - copy/paste into device
hostname R2

! Basic settings
no ip domain-lookup
ip domain-name ccnalab.com
service password-encryption

! Privileged exec password (encrypted)
enable secret ciscopass

! Local administrative user
username admin privilege 15 password adminpass

! Password policy
security passwords min-length 10

! Console access
line con 0
 password ciscoconpass
 login
 logging synchronous

! VTY (remote) access - use local database and SSH only
line vty 0 4
 login local
 transport input ssh
 exec-timeout 10 0

! SSH settings and keys
ip ssh version 2
crypto key generate rsa modulus 1024

! Interfaces
interface GigabitEthernet0/0/0
 description Link to R1
 ip address 10.67.254.1 255.255.255.252
 no shutdown

interface GigabitEthernet0/0/1
 description LAN to S1/S2
 ip address 10.67.1.1 255.255.255.0
 no shutdown

interface Loopback0
 description Router Loopback
 ip address 209.165.201.1 255.255.255.224

! Security / misc
banner motd # Unauthorized access is prohibited. #

end
wr
